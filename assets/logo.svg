  <g fill="#E05A00">
    <ellipse cx="20" cy="42" rx="8" ry="12"/>
    <ellipse cx="30" cy="36" rx="6" ry="16"/>
    <ellipse cx="20" cy="30" rx="5" ry="10"/>
    <ellipse cx="12" cy="38" rx="5" ry="10"/>
  </g>
  <!-- Wordmark -->
  <text x="45" y="38" font-family="'Liberation Sans', Arial, sans-serif"
